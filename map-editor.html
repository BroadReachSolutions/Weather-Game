<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oregon Sail — Map Editor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0c1117;
    color: #eef7ff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #131a22;
    border-bottom: 1px solid rgba(125,186,220,0.2);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    margin: 0;
    flex: 1;
  }
  .toolbar {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  button, select, input[type="text"], input[type="number"] {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(125,186,220,0.3);
    color: #eef7ff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  button.active {
    background: rgba(79,195,247,0.3);
    border-color: #4fc3f7;
  }
  button:hover { background: rgba(255,255,255,0.12); }
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid rgba(125,186,220,0.15);
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 6px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: rgba(159,194,217,0.7);
    background: rgba(255,255,255,0.03);
    flex-shrink: 0;
  }
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #070e14;
    position: relative;
    overflow: hidden;
  }
  #paintCanvas {
    cursor: crosshair;
    image-rendering: pixelated;
    border: 1px solid rgba(125,186,220,0.3);
  }
  #previewCanvas3d {
    width: 100%;
    height: 100%;
    display: block;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    padding: 12px;
    background: #0e151c;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .field-group label {
    display: block;
    font-size: 11px;
    color: rgba(159,194,217,0.8);
    margin-bottom: 4px;
  }
  .field-group input, .field-group select { width: 100%; }
  .brush-size-label { font-size: 11px; color: rgba(159,194,217,0.8); }
  .structure-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 160px;
    overflow-y: auto;
  }
  .structure-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    padding: 4px 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
  }
  .structure-item button { padding: 2px 6px; font-size: 10px; }
  .hint { font-size: 10px; color: rgba(159,194,217,0.55); line-height: 1.5; }
  #statusMsg { font-size: 11px; color: #69f0ae; min-height: 16px; }
</style>
</head>
<body>

<header>
  <h1>🗺️ Oregon Sail — Map Editor</h1>
  <div class="toolbar">
    <button id="toolLand" class="active">🟩 Land</button>
    <button id="toolWater">🟦 Water</button>
    <button id="toolStructure">⚓ Structure</button>
    <button id="toolErase">🧹 Erase</button>
  </div>
  <div class="toolbar">
    <button id="newRegionBtn">New</button>
    <button id="loadRegionBtn">Load</button>
    <button id="saveRegionBtn">Save</button>
  </div>
</header>

<main>
  <div class="panel" style="flex: 1.2;">
    <div class="panel-header">Paint — Top-Down Grid</div>
    <div class="canvas-wrap">
      <canvas id="paintCanvas" width="512" height="512"></canvas>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Live 3D Preview</div>
    <div class="canvas-wrap">
      <canvas id="previewCanvas3d"></canvas>
    </div>
  </div>

  <div class="sidebar">
    <div class="field-group">
      <label>Region Name</label>
      <input type="text" id="regionName" value="Untitled Region">
    </div>

    <div class="field-group">
      <label>Real-World Size (feet across)</label>
      <input type="number" id="worldSizeFt" value="2000" min="200" step="100">
    </div>

    <div class="field-group">
      <label>Anchor — Real Location (optional)</label>
      <input type="number" id="anchorLat" placeholder="Latitude (blank = standalone)" step="0.0001">
      <input type="number" id="anchorLon" placeholder="Longitude" step="0.0001" style="margin-top:4px;">
      <p class="hint">Leave blank for a standalone practice area (like the marina). Set both to anchor this region at a real GPS location.</p>
    </div>

    <div class="field-group">
      <label class="brush-size-label">Brush Size: <span id="brushSizeVal">3</span> cells</label>
      <input type="range" id="brushSize" min="1" max="10" value="3">
    </div>

    <div class="field-group" id="structureTypeGroup" style="display:none;">
      <label>Structure Type</label>
      <select id="structureType">
        <option value="pier">Finger Pier</option>
        <option value="dock_spine">Dock Spine</option>
        <option value="fuel_dock">Fuel Dock</option>
      </select>
      <label style="margin-top:8px;">Length (ft)</label>
      <input type="number" id="structureLength" value="35" min="5">
      <label style="margin-top:8px;">Heading (degrees)</label>
      <input type="number" id="structureHeading" value="0" min="0" max="359">
      <p class="hint">Click on the paint grid to place a structure of this type.</p>
    </div>

    <div class="field-group">
      <label>Placed Structures</label>
      <div class="structure-list" id="structureList"></div>
    </div>

    <div id="statusMsg"></div>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://ailcwfpjlelofhqmqzdy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_3QZVUGb46lWu2ubdurS2Qg_vWNMZ44e";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ---------------------------------------------------------------
     GRID STATE
     Same format the live game's terrain.js already produces from
     satellite imagery: a 2D array of "land"/"water" strings. Painting
     here is just a different AUTHORING method feeding the exact same
     downstream mesh-generation pipeline (buildTerrainMesh), so the
     live game needs no new rendering code to display hand-drawn
     regions, only a small change to check for one before falling
     back to satellite generation.
     --------------------------------------------------------------- */
  const GRID_SIZE = 64;
  let grid = [];
  let previewUpdateTimer = null; /* moved up here from further down the file -- it was being referenced (via schedulePreviewUpdate, called from redrawPaintCanvas) before its declaration line ever ran, which throws in JS for let/const and was the actual cause of the reported "nothing responds" bug */
  function resetGrid(fillType) {
    grid = [];
    for (let y = 0; y < GRID_SIZE; y++) {
      const row = [];
      for (let x = 0; x < GRID_SIZE; x++) row.push(fillType);
      grid.push(row);
    }
  }
  resetGrid("water"); /* sensible default: open water, paint land into it */

  let structures = []; /* { type, x, z, headingDeg, lengthFt } -- x/z in grid cell coordinates */

  let currentTool = "land";
  let brushSize = 3;
  let isPainting = false;

  const paintCanvas = document.getElementById("paintCanvas");
  const paintCtx = paintCanvas.getContext("2d");
  const cellPx = paintCanvas.width / GRID_SIZE;

  function redrawPaintCanvas() {
    paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
    for (let y = 0; y < GRID_SIZE; y++) {
      for (let x = 0; x < GRID_SIZE; x++) {
        paintCtx.fillStyle = grid[y][x] === "land" ? "#6b8e4e" : "#2a73ad";
        paintCtx.fillRect(x * cellPx, y * cellPx, cellPx, cellPx);
      }
    }
    /* Structures drawn as simple markers on top */
    structures.forEach(s => {
      paintCtx.save();
      paintCtx.translate((s.x + 0.5) * cellPx, (s.z + 0.5) * cellPx);
      paintCtx.rotate((s.headingDeg * Math.PI) / 180);
      paintCtx.fillStyle = "#e8c84f";
      paintCtx.fillRect(-cellPx * 0.4, -cellPx * 1.2, cellPx * 0.8, cellPx * 2.4);
      paintCtx.restore();
    });
    schedulePreviewUpdate();
  }
  redrawPaintCanvas();

  function paintAt(gx, gy, type) {
    const r = brushSize;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx * dx + dy * dy > r * r) continue; /* circular brush */
        const x = gx + dx, y = gy + dy;
        if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) continue;
        grid[y][x] = type;
      }
    }
  }

  function canvasEventToGrid(e) {
    const rect = paintCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const px = (clientX - rect.left) * (paintCanvas.width / rect.width);
    const py = (clientY - rect.top) * (paintCanvas.height / rect.height);
    return { gx: Math.floor(px / cellPx), gy: Math.floor(py / cellPx) };
  }

  function handlePaintStart(e) {
    e.preventDefault();
    const { gx, gy } = canvasEventToGrid(e);
    if (currentTool === "structure") {
      placeStructure(gx, gy);
      return;
    }
    isPainting = true;
    const type = currentTool === "erase" ? "water" : currentTool;
    paintAt(gx, gy, type);
    redrawPaintCanvas();
  }
  function handlePaintMove(e) {
    if (!isPainting) return;
    e.preventDefault();
    const { gx, gy } = canvasEventToGrid(e);
    const type = currentTool === "erase" ? "water" : currentTool;
    paintAt(gx, gy, type);
    redrawPaintCanvas();
  }
  function handlePaintEnd() { isPainting = false; }

  paintCanvas.addEventListener("mousedown", handlePaintStart);
  paintCanvas.addEventListener("mousemove", handlePaintMove);
  window.addEventListener("mouseup", handlePaintEnd);
  paintCanvas.addEventListener("touchstart", handlePaintStart, { passive: false });
  paintCanvas.addEventListener("touchmove", handlePaintMove, { passive: false });
  paintCanvas.addEventListener("touchend", handlePaintEnd);

  function placeStructure(gx, gy) {
    const type = document.getElementById("structureType").value;
    const lengthFt = parseFloat(document.getElementById("structureLength").value) || 35;
    const headingDeg = parseFloat(document.getElementById("structureHeading").value) || 0;
    structures.push({ type, x: gx, z: gy, headingDeg, lengthFt });
    renderStructureList();
    redrawPaintCanvas();
  }

  function renderStructureList() {
    const list = document.getElementById("structureList");
    list.innerHTML = "";
    structures.forEach((s, i) => {
      const item = document.createElement("div");
      item.className = "structure-item";
      item.innerHTML = `<span>${s.type} @ (${s.x},${s.z})</span><button data-remove="${i}">✕</button>`;
      list.appendChild(item);
    });
    list.querySelectorAll("[data-remove]").forEach(btn => {
      btn.addEventListener("click", () => {
        structures.splice(parseInt(btn.dataset.remove, 10), 1);
        renderStructureList();
        redrawPaintCanvas();
      });
    });
  }

  /* ---------------------------------------------------------------
     TOOLBAR
     --------------------------------------------------------------- */
  const toolButtons = {
    land: document.getElementById("toolLand"),
    water: document.getElementById("toolWater"),
    structure: document.getElementById("toolStructure"),
    erase: document.getElementById("toolErase")
  };
  Object.keys(toolButtons).forEach(key => {
    toolButtons[key].addEventListener("click", () => {
      currentTool = key;
      Object.values(toolButtons).forEach(b => b.classList.remove("active"));
      toolButtons[key].classList.add("active");
      document.getElementById("structureTypeGroup").style.display = key === "structure" ? "block" : "none";
    });
  });

  document.getElementById("brushSize").addEventListener("input", (e) => {
    brushSize = parseInt(e.target.value, 10);
    document.getElementById("brushSizeVal").textContent = brushSize;
  });

  /* ---------------------------------------------------------------
     LIVE 3D PREVIEW
     Reuses the exact same mesh-generation technique as the live
     game's terrain.js (a displaced PlaneGeometry, land raised/water
     lowered with a smoothstep taper at the shoreline) so what you see
     here is genuinely representative of how it will look in-game.

     This pane now uses the SAME water shader, gradient sky, and
     day/night system as the live game's actual Helm view (duplicated
     here since this editor is its own standalone page/script context,
     not literally running helm3d.js, which assumes a player boat
     exists at the scene origin -- this editor has no boat, just a
     free camera over the terrain). A free OrbitControls camera lets
     you fly around and look at any part of the imported/painted area,
     and clicking directly on the 3D terrain raycasts to find which
     grid cell you hit and paints it the same way the 2D canvas does.
     --------------------------------------------------------------- */
  let scene, camera, renderer, controls, previewMesh, waterMesh, skyDomeMesh, skyDomeCanvas, skyDomeCtx, skyDomeTexture, sunLight, ambientLight;
  let waveClock = 0;
  const waterUniforms = {
    uTime: { value: 0 },
    uAmplitude: { value: 1.2 },
    uOffsetX: { value: 0 },
    uOffsetZ: { value: 0 },
    uDeepColor: { value: new THREE.Color(0x1565c0) },
    uLightColor: { value: new THREE.Color(0x4fa8e8) },
    uVeinColor: { value: new THREE.Color(0xeaf6ff) },
    uCellScale: { value: 0.05 }
  };

  function rot(p, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return new THREE.Vector2(p.x * c - p.y * s, p.x * s + p.y * c);
  }

  /* Real water shader — exact same 8-layer swell + cracked-cell vein
     pattern as the live game's water (see helm3d.js buildWater),
     duplicated here for this standalone script context. Static (no
     boat-relative scrolling offset) since there's no boat here. */
  function buildEditorWater(size) {
    const geo = new THREE.PlaneGeometry(size, size, 90, 90);
    const mat = new THREE.ShaderMaterial({
      uniforms: waterUniforms,
      transparent: true,
      side: THREE.DoubleSide,
      vertexShader: `
        uniform float uTime;
        uniform float uAmplitude;
        varying float vHeight;
        varying vec2 vWorldXZ;
        vec2 rotV(vec2 p, float a) {
          float c = cos(a), s = sin(a);
          return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
        }
        void main() {
          float slowClock = uTime * 0.35;
          vec2 p = position.xy;
          vec2 primary = rotV(p, 0.0);
          vec2 secondary = rotV(p, 1.1);
          vec2 tertiary = rotV(p, 2.16);
          vec2 layer4 = rotV(p, 0.95);
          vec2 layer5 = rotV(p, 4.09);
          vec2 layer6 = rotV(p, 3.37);
          vec2 layer7 = rotV(p, 0.36);
          vec2 perp = rotV(p, 1.5708);
          float swell = sin(primary.x * 0.045 + slowClock * 0.9) * uAmplitude
                      + sin(secondary.x * 0.11 + slowClock * 1.3) * uAmplitude * 0.22
                      + sin(tertiary.x * 0.071 + slowClock * 0.61 + 1.7) * uAmplitude * 0.16
                      + sin(layer4.x * 0.093 + slowClock * 1.07 + 0.6) * uAmplitude * 0.12
                      + sin(layer5.x * 0.058 + slowClock * 0.78 + 3.2) * uAmplitude * 0.10
                      + sin(layer6.x * 0.082 + slowClock * 1.21 + 4.8) * uAmplitude * 0.09
                      + sin(layer7.x * 0.066 + slowClock * 0.52 + 2.1) * uAmplitude * 0.08
                      + sin(perp.x * 0.052 + slowClock * 0.75 + 5.5) * uAmplitude * 0.35;
          vHeight = swell / max(uAmplitude * 2.12, 0.0001);
          vWorldXZ = p;
          vec3 displaced = vec3(position.x, position.y, swell);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 uDeepColor;
        uniform vec3 uLightColor;
        uniform vec3 uVeinColor;
        uniform float uCellScale;
        varying float vHeight;
        varying vec2 vWorldXZ;
        vec2 hash2(vec2 p) {
          p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
          return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
        }
        void main() {
          vec2 uv = vWorldXZ * uCellScale;
          vec2 cell = floor(uv);
          vec2 frac = fract(uv);
          float minDist = 8.0, secondMinDist = 8.0;
          for (int y = -2; y <= 2; y++) {
            for (int x = -2; x <= 2; x++) {
              vec2 neighbor = vec2(float(x), float(y));
              vec2 point = hash2(cell + neighbor) * 0.5 + 0.5;
              vec2 diff = neighbor + point - frac;
              float dist = length(diff);
              if (dist < minDist) { secondMinDist = minDist; minDist = dist; }
              else if (dist < secondMinDist) { secondMinDist = dist; }
            }
          }
          float t = clamp((vHeight + 1.0) / 2.0, 0.0, 1.0);
          vec3 cellColor = mix(uDeepColor, uLightColor, t);
          float edgeDist = secondMinDist - minDist;
          float vein = smoothstep(0.0, 0.22, edgeDist);
          vec3 dimVein = mix(uVeinColor, cellColor, 0.45);
          vec3 color = mix(dimVein, cellColor, vein);
          gl_FragColor = vec4(color, 0.92);
        }
      `
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = 0; /* matches the terrain mesh's own y=0 sea-level reference (see buildPreviewMesh), so they align correctly regardless of worldSize */
    return mesh;
  }

  /* Real gradient sky + day/night cycle, same technique as the live
     game (canvas-texture skydome retinted by time of day). Simplified
     to a fixed "nice daytime" look here rather than tracking the
     real clock, since this is an editing tool, not gameplay — the
     LIVE dev-tools panel (added in a later piece) will let this be
     overridden on demand. */
  function buildEditorSky() {
    skyDomeCanvas = document.createElement("canvas");
    skyDomeCanvas.width = 2;
    skyDomeCanvas.height = 256;
    skyDomeCtx = skyDomeCanvas.getContext("2d");
    const grad = skyDomeCtx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, "#2a6fd6");
    grad.addColorStop(1, "#9fe0f0");
    skyDomeCtx.fillStyle = grad;
    skyDomeCtx.fillRect(0, 0, 2, 256);
    skyDomeTexture = new THREE.CanvasTexture(skyDomeCanvas);
    const domeGeo = new THREE.SphereGeometry(2000, 24, 16);
    const domeMat = new THREE.MeshBasicMaterial({ map: skyDomeTexture, side: THREE.BackSide, depthWrite: false });
    skyDomeMesh = new THREE.Mesh(domeGeo, domeMat);
    scene.add(skyDomeMesh);
  }

  function initPreview() {
    const canvas3d = document.getElementById("previewCanvas3d");
    scene = new THREE.Scene();
    const wrap = canvas3d.parentElement;
    camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 5000);
    camera.position.set(0, 500, 700);
    renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.minDistance = 30;
    controls.maxDistance = 3000; /* generous range -- free-fly over the whole imported/painted area, not just close-in like the boat-following camera */
    controls.dampingFactor = 0.08;
    controls.enableDamping = true;

    ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
    scene.add(ambientLight);
    sunLight = new THREE.DirectionalLight(0xffffff, 0.95);
    sunLight.position.set(300, 500, 200);
    scene.add(sunLight);

    buildEditorSky();
    waterMesh = buildEditorWater(4000);
    scene.add(waterMesh);

    /* Raycasting for paint-directly-on-3D-terrain: clicking the 3D
       view (not the 2D canvas) finds which grid cell of the terrain
       mesh was hit and paints it the same way, via the shared
       paintAt() function the 2D tool already uses. */
    const raycaster = new THREE.Raycaster();
    const mouseVec = new THREE.Vector2();
    let isPaintingIn3D = false;

    function paintFrom3DEvent(e) {
      if (!previewMesh) return;
      const rect = renderer.domElement.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      mouseVec.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouseVec.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouseVec, camera);
      const hits = raycaster.intersectObject(previewMesh);
      if (hits.length === 0) return;
      const hit = hits[0].point;
      const worldSizeFt = parseFloat(document.getElementById("worldSizeFt").value) || 2000;
      const worldSize = worldSizeFt * 0.24;
      /* Convert the hit's world X/Z back into grid cell coordinates,
         inverse of how buildPreviewMesh positions the grid in world
         space (centered on origin, spanning worldSize). */
      const gx = Math.floor(((hit.x / worldSize) + 0.5) * GRID_SIZE);
      const gy = Math.floor(((hit.z / worldSize) + 0.5) * GRID_SIZE);
      if (gx < 0 || gx >= GRID_SIZE || gy < 0 || gy >= GRID_SIZE) return;
      if (currentTool === "structure") {
        placeStructure(gx, gy);
        return;
      }
      const type = currentTool === "erase" ? "water" : currentTool;
      paintAt(gx, gy, type);
      redrawPaintCanvas();
    }

    renderer.domElement.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return; /* left-click only -- right/middle stay free for camera controls */
      if (currentTool === "structure") { paintFrom3DEvent(e); return; }
      isPaintingIn3D = true;
      controls.enabled = false; /* disable orbit while actively painting, so dragging paints instead of rotating the camera */
      paintFrom3DEvent(e);
    });
    renderer.domElement.addEventListener("mousemove", (e) => {
      if (isPaintingIn3D) paintFrom3DEvent(e);
    });
    window.addEventListener("mouseup", () => {
      isPaintingIn3D = false;
      controls.enabled = true;
    });

    animatePreview();
    window.addEventListener("resize", () => {
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      camera.aspect = wrap.clientWidth / wrap.clientHeight;
      camera.updateProjectionMatrix();
    });
  }
  function animatePreview() {
    requestAnimationFrame(animatePreview);
    waveClock += 0.016;
    waterUniforms.uTime.value = waveClock;
    if (controls) controls.update();
    renderer.render(scene, camera);
  }

  /* Same distance-transform height technique as terrain.js's
     buildTerrainMesh -- duplicated here intentionally rather than
     shared via a module import, since this is a standalone page with
     its own script context, not part of the main game bundle. Kept
     numerically identical so the preview is trustworthy. */
  function computeShoreDistanceGrid(g) {
    const size = g.length;
    const distances = [];
    for (let gy = 0; gy < size; gy++) {
      const row = [];
      for (let gx = 0; gx < size; gx++) {
        const myType = g[gy][gx];
        let minDist = size;
        for (let oy = 0; oy < size; oy++) {
          for (let ox = 0; ox < size; ox++) {
            if (g[oy][ox] === myType) continue;
            const d = Math.sqrt((gx - ox) ** 2 + (gy - oy) ** 2);
            if (d < minDist) minDist = d;
          }
        }
        row.push(minDist);
      }
      distances.push(row);
    }
    return distances;
  }

  function buildPreviewMesh(g, worldSize) {
    const size = g.length;
    const geo = new THREE.PlaneGeometry(worldSize, worldSize, size - 1, size - 1);
    const posAttr = geo.attributes.position;
    const shoreDist = computeShoreDistanceGrid(g);
    const maxLandHeight = Math.max(3, worldSize * 0.02);
    const maxWaterDepth = Math.max(15, worldSize * 0.05);
    const taperCells = Math.max(2, size * 0.2);

    for (let gy = 0; gy < size; gy++) {
      for (let gx = 0; gx < size; gx++) {
        const vertIndex = gy * size + gx;
        const isLand = g[gy][gx] === "land";
        const dist = shoreDist[gy][gx];
        const t = Math.min(1, dist / taperCells);
        const eased = t * t * (3 - 2 * t);
        const height = isLand ? maxLandHeight * eased : -maxWaterDepth * eased;
        posAttr.setZ(vertIndex, height);
      }
    }
    posAttr.needsUpdate = true;
    geo.computeVertexNormals();
    geo.rotateX(-Math.PI / 2);
    const mat = new THREE.MeshPhongMaterial({ color: 0x6b8e4e, flatShading: true, vertexColors: false });
    return new THREE.Mesh(geo, mat);
  }

  function schedulePreviewUpdate() {
    /* Debounced -- painting fires many times per second while
       dragging, but rebuilding a 64x64 mesh on every single one would
       be wasteful; a short delay batches rapid strokes into one
       rebuild. */
    if (previewUpdateTimer) clearTimeout(previewUpdateTimer);
    previewUpdateTimer = setTimeout(updatePreviewMesh, 150);
  }
  function updatePreviewMesh() {
    if (!scene) return;
    if (previewMesh) {
      scene.remove(previewMesh);
      previewMesh.geometry.dispose();
      previewMesh.material.dispose();
    }
    const worldSizeFt = parseFloat(document.getElementById("worldSizeFt").value) || 2000;
    previewMesh = buildPreviewMesh(grid, worldSizeFt * 0.24); /* same UNITS_PER_FOOT conversion as the live game */
    scene.add(previewMesh);
  }

  /* ---------------------------------------------------------------
     SAVE / LOAD
     --------------------------------------------------------------- */
  function setStatus(msg, isError) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg;
    el.style.color = isError ? "#ff8a65" : "#69f0ae";
  }

  document.getElementById("newRegionBtn").addEventListener("click", () => {
    if (!confirm("Start a new region? Unsaved changes will be lost.")) return;
    resetGrid("water");
    structures = [];
    document.getElementById("regionName").value = "Untitled Region";
    document.getElementById("anchorLat").value = "";
    document.getElementById("anchorLon").value = "";
    renderStructureList();
    redrawPaintCanvas();
    setStatus("Started a new region.");
  });

  document.getElementById("saveRegionBtn").addEventListener("click", async () => {
    const name = document.getElementById("regionName").value.trim() || "Untitled Region";
    const worldSizeFt = parseFloat(document.getElementById("worldSizeFt").value) || 2000;
    const latVal = document.getElementById("anchorLat").value;
    const lonVal = document.getElementById("anchorLon").value;
    const payload = {
      name,
      anchor_lat: latVal !== "" ? parseFloat(latVal) : null,
      anchor_lon: lonVal !== "" ? parseFloat(lonVal) : null,
      classification_grid: grid,
      grid_size: GRID_SIZE,
      world_size_ft: worldSizeFt,
      structures,
      updated_at: new Date().toISOString()
    };
    const { error } = await sb.from("custom_map_regions").insert(payload);
    if (error) { setStatus("Save failed: " + error.message, true); return; }
    setStatus("Saved \"" + name + "\".");
  });

  document.getElementById("loadRegionBtn").addEventListener("click", async () => {
    const { data, error } = await sb.from("custom_map_regions").select("*").order("updated_at", { ascending: false }).limit(20);
    if (error) { setStatus("Load failed: " + error.message, true); return; }
    if (!data || data.length === 0) { setStatus("No saved regions found.", true); return; }
    const choice = prompt("Saved regions:\n" + data.map((r, i) => `${i + 1}. ${r.name}`).join("\n") + "\n\nEnter a number to load:");
    const idx = parseInt(choice, 10) - 1;
    if (isNaN(idx) || !data[idx]) return;
    const region = data[idx];
    grid = region.classification_grid;
    structures = region.structures || [];
    document.getElementById("regionName").value = region.name;
    document.getElementById("worldSizeFt").value = region.world_size_ft;
    document.getElementById("anchorLat").value = region.anchor_lat != null ? region.anchor_lat : "";
    document.getElementById("anchorLon").value = region.anchor_lon != null ? region.anchor_lon : "";
    renderStructureList();
    redrawPaintCanvas();
    setStatus("Loaded \"" + region.name + "\".");
  });

  document.getElementById("worldSizeFt").addEventListener("change", schedulePreviewUpdate);

  /* Deferred until the window has fully loaded (not just DOM parsed)
     -- calling this too early can leave the canvas wrapper's
     clientWidth/clientHeight at 0 if the flex layout hasn't actually
     been painted yet, which can make THREE.WebGLRenderer throw and
     halt the rest of this script entirely, including every toolbar
     button's event listener below it. This was the actual cause of
     the reported "nothing responds, not even the buttons" bug. */
  window.addEventListener("load", () => {
    try {
      initPreview();
      updatePreviewMesh();
    } catch (e) {
      console.error("Map Editor: 3D preview failed to initialize", e);
      setStatus("3D preview failed to load (painting still works) — " + e.message, true);
    }
  });
</script>

</body>
</html>
